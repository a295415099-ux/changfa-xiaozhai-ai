<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>长发小寨 AI 总控台</title>
    <link rel="stylesheet" href="./styles.css?v=20260717-visual-workspaces-v2">
  </head>
  <body>
    <header class="site-header" aria-label="总控台顶部导航">
      <button id="mobileMenuButton" type="button" class="site-index-button" aria-label="打开文档目录">index</button>
      <a class="site-brand" href="./" aria-label="长发小寨 AI 总控台首页">
        <span class="site-mark">cx</span>
        <span>
          <strong>长发小寨 AI 总控台</strong>
          <small id="mobileDocGroup">文档库</small>
        </span>
      </a>
      <nav class="site-nav" aria-label="快速入口">
        <button type="button" data-route-group="总控导航">总览</button>
        <button type="button" data-visual-type="hero">首图</button>
        <button type="button" data-visual-type="detail">商详页</button>
        <button type="button" data-visual-type="home">平台首页</button>
        <button type="button" data-route-group="全部">文档</button>
      </nav>
    </header>

    <div id="sidebarBackdrop" class="sidebar-backdrop" hidden></div>

    <div class="app-shell">
      <aside id="sidebar" class="sidebar" aria-label="总控台文档导航">
        <div class="sidebar-header">
          <div class="brand-block">
            <div class="brand-mark">CX</div>
            <div>
              <h1>长发小寨 AI 总控台</h1>
              <p>品牌设计部 / SOP / AI 项目 / 资料库</p>
            </div>
          </div>
          <button id="sidebarCloseButton" type="button" class="close-button" aria-label="关闭目录">关闭</button>
        </div>

        <section class="overview-grid" aria-label="总览数据">
          <div>
            <strong id="totalDocs">0</strong>
            <span>文档</span>
          </div>
          <div>
            <strong id="totalGroups">0</strong>
            <span>栏目</span>
          </div>
          <div>
            <strong id="resultCount">0</strong>
            <span>当前结果</span>
          </div>
        </section>

        <div class="search-box">
          <label for="searchInput">搜索</label>
          <input id="searchInput" type="search" placeholder="AI项目02、商详页、Prompt、竞品..." autocomplete="off">
        </div>

        <section class="route-panel" aria-label="常用入口">
          <div class="section-label">常用入口</div>
          <div class="route-grid">
            <button type="button" data-route-group="总控导航">总览</button>
            <button type="button" data-visual-type="hero">首图</button>
            <button type="button" data-visual-type="detail">商详页</button>
            <button type="button" data-visual-type="home">平台首页</button>
            <button type="button" data-route-group="AI项目执行">AI项目</button>
            <button type="button" data-route-group="模板库">模板</button>
          </div>
        </section>

        <nav id="groupFilters" class="group-filters" aria-label="栏目筛选"></nav>
        <nav id="docList" class="doc-list" aria-label="文档列表"></nav>
      </aside>

      <main class="workspace">
        <section id="commandPanel" class="command-panel">
          <div class="doc-heading">
            <p id="docGroup" class="eyebrow">文档库</p>
            <div id="pageNumber" class="page-number">00</div>
            <h2 id="docTitle">请选择文档</h2>
            <p id="docPath" class="doc-path"></p>
          </div>

          <div class="actions" aria-label="文档操作">
            <button id="viewButton" type="button" class="mode-button active" title="阅读模式">阅读</button>
            <button id="editButton" type="button" class="mode-button" title="编辑模式">编辑</button>
            <button id="copyButton" type="button" title="复制 Markdown">复制</button>
            <button id="downloadButton" type="button" title="下载当前文档">下载</button>
            <button id="githubEditButton" type="button" title="在 GitHub 上编辑源文件">GitHub</button>
            <button id="resetButton" type="button" class="quiet" title="恢复原文">恢复</button>
          </div>
        </section>

        <section id="mobileSearchPanel" class="mobile-search-panel">
          <input id="mobileSearchInput" type="search" placeholder="搜索总控台内容..." autocomplete="off">
          <div id="mobileGroupFilters" class="mobile-group-filters"></div>
        </section>

        <section id="statusStrip" class="status-strip">
          <span id="saveStatus">网页内编辑会保存到当前浏览器</span>
          <span>GitHub Pages 静态发布，正式改源文件请用 GitHub 按钮。</span>
        </section>

        <section id="reader" class="reader" aria-live="polite"></section>
        <section id="editorPanel" class="editor-panel" hidden>
          <textarea id="editor" spellcheck="false" aria-label="Markdown 编辑器"></textarea>
          <div class="editor-status">
            <span id="editorHint">编辑会自动保存到当前浏览器</span>
            <button id="saveButton" type="button">保存到浏览器</button>
          </div>
        </section>

        <section id="visualWorkspace" class="visual-workspace" hidden aria-live="polite">
          <header class="visual-workspace-header">
            <div>
              <p class="visual-workspace-kicker">视觉资产工作区</p>
              <h2 id="visualWorkspaceTitle">首图</h2>
              <p id="visualWorkspaceDescription">按产品、平台和版本查看首图设计及上线数据。</p>
            </div>
            <div class="visual-workspace-count">
              <strong id="visualResultCount">0</strong>
              <span>个版本</span>
            </div>
          </header>

          <div class="visual-toolbar">
            <div class="visual-type-tabs" aria-label="视觉资产类型">
              <button type="button" data-visual-type="hero">首图</button>
              <button type="button" data-visual-type="detail">商详页</button>
              <button type="button" data-visual-type="home">平台首页</button>
            </div>
            <div class="visual-filters">
              <label>
                <span>产品</span>
                <select id="visualProductFilter"></select>
              </label>
              <label>
                <span>平台</span>
                <select id="visualPlatformFilter"></select>
              </label>
              <label>
                <span>状态</span>
                <select id="visualStatusFilter"></select>
              </label>
            </div>
          </div>

          <div id="visualEmptyState" class="visual-empty-state" hidden>
            <strong>这个工作区还没有素材</strong>
            <p>按“产品 / 平台 / 版本”放入对应文件夹，重新构建后会自动出现。</p>
          </div>

          <div id="visualLayout" class="visual-layout">
            <aside class="visual-collection-panel" aria-label="版本列表">
              <div class="visual-panel-heading">
                <strong>版本列表</strong>
                <span id="visualFilteredCount">0</span>
              </div>
              <div id="visualCollectionList" class="visual-collection-list"></div>
            </aside>
            <article id="visualViewer" class="visual-viewer"></article>
          </div>
        </section>
      </main>
    </div>

    <script src="./content.js?v=20260717-visual-workspaces-v2"></script>
    <script src="./visual-assets.js?v=20260717-visual-workspaces-v2"></script>
    <script src="./app.js?v=20260717-visual-workspaces-v2"></script>
  </body>
</html>
